<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="assets/branding/icon-1024.png">
  <link rel="stylesheet" href="style.css">

<body>

      <a href="#downloads">Downloads</a>
      <a href="#contact">Contact</a>

  </header>

    <section class="hero" id="hero">
      <div class="text">
        <a class="brand" href="https://store.steampowered.com/app/3636520/Harvest_Scream" target="_blank">

    <section id="contact">
      <h2>Contact</h2>
      <p id="studio"></p>
      <ul id="contacts"></ul>
    </section>
  </main>

  <footer class="wrap foot">
    <span>All images and logos © Green Vector Games, free to use for press purposes.</span>
    <span id="lastUpdated"></span>
  </footer>

  <script src="script.js"></script>
